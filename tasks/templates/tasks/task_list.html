<!DOCTYPE html>
<html>
<head>
    <title>My To-Do List</title>
</head>
<body>
    <h1>My Tasks</h1>
    <ul>
        {% for task in tasks %}
            <li>
                {{ task.title }} 
                {% if task.completed %} (Done! ✅) {% else %} (Pending ⏳) {% endif %}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
