<!DOCTYPE html>
<html>
<head>
    <title>My To-Do List</title>
    <style>
        .pending{
            color:red
            font-weight:bold;
        }
        .completed{
            color:green;
        }
    </style>
</head>
<body>
    <h1>My Tasks</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Task</button></form>
        <hr>
    
    <ul>
        {% for task in tasks %}
            <li>
                {{ task.title }} 
                {% if task.completed %} 
                <span class='completed'>(Done! ✅)</span> 
                {% else %}
                <span class='pending'>(Pending ⏳) </span> {% endif %}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
